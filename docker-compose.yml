version: "3.9"

# ────────────────────────────────────────────────────────────────────────────────
# MACS — Multi-Agent Crisis Response System — Docker Compose
#
# Demo kill command:
#   docker compose stop macs-core     → kills all MACs live
#
# Note: In this architecture the shared state (BulletinBoard) lives in the
# macs-core process. For true multi-process isolation, swap to Redis Streams
# and run one container per MAC.
# ────────────────────────────────────────────────────────────────────────────────

services:
  macs-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    container_name: macs-core
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SCENARIO=${SCENARIO:-cascade}
    ports:
      - "8765:8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",8765)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: macs-dashboard
    ports:
      - "3000:80"
    depends_on:
      - macs-core
    restart: unless-stopped
